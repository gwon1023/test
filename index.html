<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Lotto Number Generator</h1>
        <button id="theme-toggle" type="button" aria-label="Toggle color theme">Dark Mode</button>
    </header>

    <main>
        <div class="lotto-container">
            <div id="lotto-numbers" class="number-grid">
                <!-- Numbers will be generated here -->
            </div>
            <button id="generate-btn">Generate Numbers</button>
        </div>

        <section class="inquiry-section" aria-labelledby="partnership-heading">
            <div class="inquiry-card">
                <p class="eyebrow">Partnership</p>
                <h2 id="partnership-heading">Affiliate Inquiry</h2>
                <p class="inquiry-description">Send a quick partnership inquiry and we will review your proposal.</p>

                <form class="inquiry-form" action="https://formspree.io/f/xreoyeyg" method="POST">
                    <input type="hidden" name="_subject" value="New affiliate inquiry">
                    <label>
                        Name
                        <input type="text" name="name" placeholder="Your name" required>
                    </label>
                    <label>
                        Email
                        <input type="email" name="email" placeholder="you@example.com" required>
                    </label>
                    <label>
                        Company
                        <input type="text" name="company" placeholder="Company or channel name">
                    </label>
                    <label>
                        Proposal
                        <textarea name="message" rows="5" placeholder="Tell us about your audience, product, or proposal." required></textarea>
                    </label>
                    <button type="submit">Send Inquiry</button>
                </form>
            </div>
        </section>

        <section class="comments-section" aria-labelledby="comments-heading">
            <div class="comments-card">
                <p class="eyebrow">Community</p>
                <h2 id="comments-heading">Comments</h2>
                <div id="disqus_thread"></div>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </div>
        </section>
    </main>

    <script>
        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = 'lotto-generator-home';
        };

        (function() {
            var d = document;
            var s = d.createElement('script');
            s.src = 'https://test2-imgscv22ai.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <script src="main.js"></script>
</body>
</html>
